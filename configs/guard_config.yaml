# AgentGuard 配置文件
# 三层纵深防御：输入 → 工具 → 输出

guard:
  # 输入围栏（提示注入检测）
  input:
    enabled: true
    # 快速规则层：正则匹配（默认开启，零延迟）
    regex_enabled: true
    # 语义分析层：Embedding 相似度检测（可选）
    semantic_check: false
    semantic_threshold: 0.72
    # LLM Judge 层：深度语义判断（可选，需要 llm_client）
    llm_judge: false
    llm_judge_threshold: 0.55

  # 工具围栏（工具调用参数审查）
  tool:
    enabled: true
    # 文件系统检查器
    file:
      enabled: true
      # 允许的基目录列表（白名单策略，默认 /tmp 和 /var/tmp）
      allowed_base_paths: ["/tmp", "/var/tmp"]
      # 是否允许访问用户 home 目录（默认 false，更严格）
      allow_home: false
    # Shell 命令检查器
    shell:
      enabled: true
      # 允许执行的命令白名单（默认只允许基础安全命令）
      allowed_commands: ["ls", "cat", "grep", "find", "wc", "head", "tail", "sort", "uniq", "awk", "sed", "cut", "tr", "echo", "printf", "date", "whoami", "id", "pwd", "which", "file", "stat"]
      # 是否允许重定向（默认 false）
      allow_redirect: false
      # 是否允许管道（默认 false）
      allow_pipe: false
    # 网络检查器（SSRF 防护）
    network:
      enabled: true
      # 是否允许访问私网地址（默认 false）
      allow_private: false
      # 允许的域名白名单（空列表表示不限制）
      allowed_domains: []
      # 拒绝的域名黑名单
      blocked_domains: ["evil.com", "malicious.net"]
    # SQL 检查器
    sql:
      enabled: true
      # 是否允许写操作（INSERT/UPDATE/DELETE，默认 false）
      allow_write: false
      # 是否允许多语句执行（默认 false）
      allow_multi_statement: false
    # MCP 描述扫描器
    mcp:
      enabled: true
      # 严格模式（更激进的阻断）
      strict_mode: false
      # 是否启用 LLM Judge 语义分析（可选，需要 llm_client）
      llm_judge: false
      llm_judge_threshold: "medium"

  # 输出围栏（敏感信息泄露检测）
  output:
    enabled: true
    # 严格模式：将 WARN 升级为 BLOCK
    strict_mode: false
    # 系统提示词（用于检测 System Prompt 泄露）
    system_prompt: ""
    # 脱敏配置
    masking:
      enabled: true
      # 脱敏模式：partial（部分脱敏）/ full（完全替换）
      mode: "partial"
